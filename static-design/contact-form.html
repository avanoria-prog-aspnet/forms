<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact-form</title>
    <script type="importmap"></script>
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/site.css" />
</head>
<body>

    <div class="app-layout">
        <header></header>
        <main>

            <section class="contact-form-section">
            
                <form novalidate>
                    
                    <div class="form-checkbox-group">
                        <label class="form-checkbox">
                            <input id="terms" class="form-checkbox-input" type="checkbox" />
                            <span class="form-checkbox-checkmark"></span>
                        </label>
                        <label class="form-checkbox-label" for="terms">I accept the terms and conditions for this website.</label>
                        <span class="field-validation field-validation-error">You must accept the terms and conditions</span>
                    </div>
                </form>

            </section>


        </main>
        <footer></footer>
    </div>

    <script src="js/site.js"></script>
</body>
</html>
